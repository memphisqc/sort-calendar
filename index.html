<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sort Recap Calendar</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #222;
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .title {
      font-size: 28px;
      font-weight: 700;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    select, button {
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      background: white;
      font-size: 14px;
      cursor: pointer;
    }

    .legend {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 18px;
      font-size: 14px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .legend-color {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      border: 1px solid rgba(0,0,0,0.15);
    }

    .calendar-wrap {
      background: white;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      overflow: hidden;
      margin-bottom: 20px;
    }

    .calendar-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: #1f2937;
      color: white;
      font-weight: 700;
      text-align: center;
    }

    .calendar-header div {
      padding: 14px 8px;
      border-right: 1px solid rgba(255,255,255,0.08);
    }

    .calendar-header div:last-child {
      border-right: none;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      min-height: 600px;
    }

    .day-cell {
      position: relative;
      min-height: 120px;
      border-right: 1px solid #e5e7eb;
      border-bottom: 1px solid #e5e7eb;
      padding: 10px;
      background: #fff;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      cursor: default;
    }

    .day-cell:hover {
      z-index: 2;
      box-shadow: 0 8px 24px rgba(0,0,0,0.10);
    }

    .day-cell.empty {
      background: #f9fafb;
    }

    .day-number {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .status-pill {
      display: inline-block;
      padding: 5px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      color: white;
      margin-bottom: 8px;
    }

    .good {
      background: #22c55e;
    }

    .bad {
      background: #ef4444;
    }

    .warning {
      background: #facc15;
      color: #111827;
    }

    .neutral {
      background: #9ca3af;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .status-row .status-pill {
      margin-bottom: 0;
    }

    .status-icons-wrap {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .status-delay-icon {
      width: 22px;
      height: 22px;
      display: inline-block;
      flex: 0 0 22px;
      color: #111827;
    }

    .status-delay-icon svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .preview-line {
      font-size: 12px;
      line-height: 1.4;
      color: #374151;
      margin-bottom: 4px;
    }

    .hover-card {
      position: fixed;
      pointer-events: none;
      display: none;
      width: 290px;
      background: white;
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.18);
      padding: 14px;
      z-index: 9999;
      border: 1px solid #e5e7eb;
    }

    .hover-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .hover-row {
      font-size: 13px;
      margin-bottom: 6px;
      color: #374151;
    }

    .details-panel {
      background: white;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      padding: 20px;
    }

    .details-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 18px;
    }

    .details-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 14px;
    }

    .detail-card {
      background: #f3f4f6;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      padding: 16px;
    }

    .detail-label {
      font-size: 16px;
      color: #111827;
      margin-bottom: 12px;
      font-weight: 700;
      border-bottom: 1px solid #d1d5db;
      padding-bottom: 8px;
    }

    .detail-value {
      font-size: 14px;
      line-height: 1.7;
      color: #111827;
      word-break: break-word;
      font-weight: 600;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 4px 0;
      border-bottom: 1px solid rgba(209, 213, 219, 0.5);
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-row-label {
      color: #374151;
      font-weight: 700;
      flex: 1;
    }

    .detail-row-value {
      color: #111827;
      text-align: right;
      flex: 0 0 auto;
    }

    .empty-message {
      padding: 20px;
      font-size: 15px;
      color: #6b7280;
    }

    .error-box {
      background: #fff3f3;
      color: #991b1b;
      border: 1px solid #fecaca;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 16px;
      display: none;
    }

    @media (max-width: 900px) {
      .calendar-grid {
        min-height: auto;
      }

      .day-cell {
        min-height: 95px;
        padding: 8px;
      }

      .preview-line {
        font-size: 11px;
      }
    }

    @media (max-width: 700px) {
      .calendar-header div {
        font-size: 12px;
        padding: 10px 4px;
      }

      .day-cell {
        min-height: 88px;
      }

      .title {
        font-size: 22px;
      }

      .day-number {
        font-size: 12px;
      }

      .status-pill {
        font-size: 10px;
        padding: 4px 6px;
      }

      .preview-line {
        display: none;
      }

      .detail-row {
        flex-direction: column;
        gap: 2px;
      }

      .detail-row-value {
        text-align: left;
      }

      .status-delay-icon {
        width: 18px;
        height: 18px;
        flex: 0 0 18px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div class="title">Sort Recap Calendar</div>
      <div class="controls">
        <select id="monthSelect"></select>
        <button id="todayBtn">Current Month</button>
      </div>
    </div>

    <div id="errorBox" class="error-box"></div>

    <div class="legend">
      <div class="legend-item">
        <div class="legend-color" style="background:#22c55e;"></div>
        <span>On Time</span>
      </div>
      <div class="legend-item">
        <div class="legend-color" style="background:#facc15;"></div>
        <span>Delayed (15 or below variance)</span>
      </div>
      <div class="legend-item">
        <div class="legend-color" style="background:#ef4444;"></div>
        <span>Delayed (over 15 variance)</span>
      </div>
      <div class="legend-item">
        <div class="legend-color" style="background:#9ca3af;"></div>
        <span>No Data</span>
      </div>
    </div>

    <div class="calendar-wrap">
      <div class="calendar-header">
        <div>Sunday</div>
        <div>Monday</div>
        <div>Tuesday</div>
        <div>Wednesday</div>
        <div>Thursday</div>
        <div>Friday</div>
        <div>Saturday</div>
      </div>
      <div id="calendarGrid" class="calendar-grid"></div>
    </div>

    <div class="details-panel">
      <div class="details-title" id="detailsTitle">Click a day to view full sort details</div>
      <div id="detailsContent" class="empty-message">No day selected yet.</div>
    </div>
  </div>

  <div id="hoverCard" class="hover-card"></div>

    function getDelayIcon(code) {
      const cleanCode = String(code || "").trim().toUpperCase();

      const iconMap = {
        AS: towerPlaneIcon(),
        ES: towerPlaneIcon(),
        TS: towerPlaneIcon(),
        BS: mailboxIcon(),
        CS: crewIcon(),
        SS: crewIcon(),
        DS: monitorAlertIcon(),
        GS: maintenanceIcon(),
        MS: maintenanceIcon(),
        WS: weatherStormIcon(),
        ZS: systemsServerIcon(),
        IS: globeIcon(),
        IP: globeIcon(),
        JS: charterJetIcon(),
        QS: feederPlaneIcon(),
        VS: barrierIcon(),
        XS: volumeBoxIcon(),
        YS: snowflakeIcon()
      };

      return iconMap[cleanCode] || "";
    }

    function parseDelayCodes(rawCode) {
      const value = String(rawCode || "").trim().toUpperCase();
      if (!value) return [];

      return value
        .split(/[\/,|&+\s]+/)
        .map(code => code.trim())
        .filter(code => code);
    }

    function getDelayStatusIcons(rawCode) {
      const codes = parseDelayCodes(rawCode);
      const seen = new Set();
      const icons = [];

      codes.forEach(code => {
        if (seen.has(code)) return;
        seen.add(code);
        const icon = getDelayIcon(code);
        if (icon) icons.push(icon);
      });

      return icons.join("");
    }

    function showError(message) {
      errorBox.style.display = "block";
      errorBox.textContent = message;
      console.error(message);
    }

    function cleanKey(key) {
      return String(key || "").replace(/\u00A0/g, " ").trim();
    }

    function normalizeRecord(record) {
      const cleaned = {};
      Object.keys(record).forEach(key => {
        cleaned[cleanKey(key)] =
          typeof record[key] === "string"
            ? record[key].replace(/\u00A0/g, " ").trim()
            : record[key];
      });
      return cleaned;
    }

    function parseExcelDate(value) {
      if (!value) return null;

      const str = String(value).trim();
      if (!str) return null;

      const parts = str.split(/[\/\-]/);
      if (parts.length === 3) {
        let month = parseInt(parts[0], 10);
        let day = parseInt(parts[1], 10);
        let year = parseInt(parts[2], 10);

        if (year < 100) year += 2000;

        const d = new Date(year, month - 1, day);
        if (!isNaN(d.getTime())) return d;
      }

      const fallback = new Date(str);
      if (!isNaN(fallback.getTime())) return fallback;

      return null;
    }

    function formatMonthKey(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`;
    }

    function formatMonthLabel(date) {
      return date.toLocaleDateString("en-US", {
        month: "long",
        year: "numeric"
      });
    }

    function formatDisplayDate(date) {
      return date.toLocaleDateString("en-US", {
        month: "long",
        day: "numeric",
        year: "numeric"
      });
    }

    function getVarianceNumber(record) {
      const raw = record["Sort Down Variance:"] || record["Sort Down Variance"] || "";
      const cleaned = String(raw).replace(/[^0-9.-]/g, "");
      const value = parseFloat(cleaned);
      return isNaN(value) ? null : value;
    }

    function getStatusClass(status, record) {
      const s = String(status || "").trim().toLowerCase();
      const variance = getVarianceNumber(record);

      if (s === "on time") return "good";

      if (s === "delayed") {
        if (variance !== null) {
          if (variance > 15) return "bad";
          return "warning";
        }
        return "bad";
      }

      return "neutral";
    }

    function getShortValue(value, fallback = "-") {
      if (value === undefined || value === null || value === "") return fallback;
      return value;
    }

    function parseCSVLine(line) {
      const result = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const next = line[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === "," && !inQuotes) {
          result.push(current);
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current);
      return result;
    }

    function parseCSV(text) {
      const lines = text
        .replace(/\r\n/g, "\n")
        .replace(/\r/g, "\n")
        .split("\n")
        .filter(line => line.trim() !== "");

      if (!lines.length) return [];

      const headers = parseCSVLine(lines[0]).map(cleanKey);
      const rows = [];

      for (let i = 1; i < lines.length; i++) {
        const values = parseCSVLine(lines[i]);
        const row = {};

        headers.forEach((header, index) => {
          row[header] = values[index] !== undefined ? values[index].trim() : "";
        });

        rows.push(row);
      }

      return rows;
    }

    function detailRow(label, value) {
      return `
        <div class="detail-row">
          <div class="detail-row-label">${label}</div>
          <div class="detail-row-value">${getShortValue(value)}</div>
        </div>
      `;
    }

    function detailCard(title, rowsHtml) {
      return `
        <div class="detail-card">
          <div class="detail-label">${title}</div>
          <div class="detail-value">${rowsHtml}</div>
        </div>
      `;
    }

    function buildMonthOptions() {
      const uniqueMonths = [...new Set(
        rawData
          .filter(r => r._dateObj)
          .map(r => formatMonthKey(r._dateObj))
      )].sort((a, b) => a.localeCompare(b));

      monthSelect.innerHTML = "";

      uniqueMonths.forEach(monthKey => {
        const [year, month] = monthKey.split("-").map(Number);
        const date = new Date(year, month - 1, 1);

        const option = document.createElement("option");
        option.value = monthKey;
        option.textContent = formatMonthLabel(date);
        monthSelect.appendChild(option);
      });

      if (uniqueMonths.length) {
        currentMonthKey = uniqueMonths[uniqueMonths.length - 1];
        monthSelect.value = currentMonthKey;
      }
    }

    function renderCalendar() {
      calendarGrid.innerHTML = "";

      if (!currentMonthKey) {
        calendarGrid.innerHTML = '<div class="empty-message">No month data found.</div>';
        return;
      }

      const [year, month] = currentMonthKey.split("-").map(Number);
      const firstDay = new Date(year, month - 1, 1);
      const lastDay = new Date(year, month, 0);
      const startWeekday = firstDay.getDay();
      const daysInMonth = lastDay.getDate();

      const monthRecords = rawData.filter(r => formatMonthKey(r._dateObj) === currentMonthKey);
      const recordMap = {};

      monthRecords.forEach(record => {
        recordMap[record._dateObj.getDate()] = record;
      });

      for (let i = 0; i < startWeekday; i++) {
        const emptyCell = document.createElement("div");
        emptyCell.className = "day-cell empty";
        calendarGrid.appendChild(emptyCell);
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const cell = document.createElement("div");
        const record = recordMap[day];
        cell.className = "day-cell";

        const dayNumber = document.createElement("div");
        dayNumber.className = "day-number";
        dayNumber.textContent = day;
        cell.appendChild(dayNumber);

        if (record) {
          const status = getShortValue(record["overallStatus"], "No Data");
          const statusClass = getStatusClass(status, record);

          const statusRow = document.createElement("div");
          statusRow.className = "status-row";

          const pill = document.createElement("div");
          pill.className = `status-pill ${statusClass}`;
          pill.textContent = status;
          statusRow.appendChild(pill);

          if (String(status).trim().toLowerCase() === "delayed") {
            const delayIconsHtml = getDelayStatusIcons(record["Delay Code"]);
            if (delayIconsHtml) {
              const iconsWrap = document.createElement("div");
              iconsWrap.className = "status-icons-wrap";
              iconsWrap.innerHTML = delayIconsHtml;
              statusRow.appendChild(iconsWrap);
            }
          }

          cell.appendChild(statusRow);

          const preview1 = document.createElement("div");
          preview1.className = "preview-line";
          preview1.textContent = `Delay: ${getShortValue(record["Delay Code"])} | ${getShortValue(record["Short Delay Narrative"])}`;
          cell.appendChild(preview1);

          const preview2 = document.createElement("div");
          preview2.className = "preview-line";
          preview2.textContent = `Variance: ${getShortValue(record["Sort Down Variance:"] || record["Sort Down Variance"])} | Box Var: ${getShortValue(record["Box Volume Variance"])}`;
          cell.appendChild(preview2);

          const preview3 = document.createElement("div");
          preview3.className = "preview-line";
          preview3.textContent = `Inbound: ${getShortValue(record["Overall Inbound"])} | Arrival Rate: ${getShortValue(record["Arrival Rate"])}`;
          cell.appendChild(preview3);

          cell.style.cursor = "pointer";
          cell.addEventListener("mouseenter", (e) => showHoverCard(e, record));
          cell.addEventListener("mousemove", moveHoverCard);
          cell.addEventListener("mouseleave", hideHoverCard);
          cell.addEventListener("click", () => showDetails(record));
        } else {
          const none = document.createElement("div");
          none.className = "status-pill neutral";
          none.textContent = "No Data";
          cell.appendChild(none);
        }

        calendarGrid.appendChild(cell);
      }
    }

    function showHoverCard(event, record) {
      hoverCard.innerHTML = `
        <div class="hover-title">${formatDisplayDate(record._dateObj)}</div>
        <div class="hover-row"><strong>Status:</strong> ${getShortValue(record["overallStatus"])}</div>
        <div class="hover-row"><strong>Sort Down Variance:</strong> ${getShortValue(record["Sort Down Variance:"] || record["Sort Down Variance"])}</div>
        <div class="hover-row"><strong>Delay Code:</strong> ${getShortValue(record["Delay Code"])}</div>
        <div class="hover-row"><strong>Narrative:</strong> ${getShortValue(record["Short Delay Narrative"])}</div>
        <div class="hover-row"><strong>Box Volume Actual:</strong> ${getShortValue(record["Box Volume Actual"])}</div>
        <div class="hover-row"><strong>SPSS Volume Actual:</strong> ${getShortValue(record["SPSS Volume Actual"])}</div>
        <div class="hover-row"><strong>Overall Inbound:</strong> ${getShortValue(record["Overall Inbound"])}</div>
      `;
      hoverCard.style.display = "block";
      moveHoverCard(event);
    }

    function moveHoverCard(event) {
      hoverCard.style.left = `${event.clientX + 14}px`;
      hoverCard.style.top = `${event.clientY + 14}px`;
    }

    function hideHoverCard() {
      hoverCard.style.display = "none";
    }

    function showDetails(record) {
      detailsTitle.textContent = `Sort Details - ${formatDisplayDate(record._dateObj)}`;

      detailsContent.innerHTML = `
        <div class="details-grid">
          ${detailCard("FWSH Summary",
            detailRow("Sort Date:", formatDisplayDate(record._dateObj)) +
            detailRow("Planned Sort Down Time:", record["Planned Sort Down Time:"]) +
            detailRow("Actual Sort Down Time:", record["Actual Sort Down Time:"]) +
            detailRow("Sort Down Variance:", record["Sort Down Variance:"] || record["Sort Down Variance"]) +
            detailRow("Delay Code", record["Delay Code"]) +
            detailRow("Short Delay Narrative", record["Short Delay Narrative"])
          )}

          ${detailCard("Box Sort",
            detailRow("Box Volume Plan", record["Box Volume Plan"]) +
            detailRow("Box Volume Actual", record["Box Volume Actual"]) +
            detailRow("Box Volume Variance", record["Box Volume Variance"]) +
            detailRow("Box Volume Plan vs Act", record["Box Volume Plan vs Act"]) +
            detailRow("Box Average Throughput", record["Box Average Throughput"])
          )}

          ${detailCard("Doc Sort",
            detailRow("SPSS Volume Plan", record["SPSS Volume Plan"]) +
            detailRow("SPSS Volume Actual", record["SPSS Volume Actual"]) +
            detailRow("SPSS Volume Variance", record["SPSS Volume Variance"]) +
            detailRow("SPSS Volume Plan vs Act", record["SPSS Volume Plan vs Act"])
          )}

          ${detailCard("Inbound Summary",
            detailRow("Dom IB-On Time%", record["Dom IB-On Time%"]) +
            detailRow("INTL IB-On Time%", record["INTL IB-On Time%"]) +
            detailRow("After 1:00 Sum / 1:01 - 1:30", record["After 1:00 Sum / 1:01 - 1:30"]) +
            detailRow("After 1:00 Sum / 1:31 - 2:00", record["After 1:00 Sum / 1:31 - 2:00"]) +
            detailRow("After 1:00 Sum / 2:01 - 2:30", record["After 1:00 Sum / 2:01 - 2:30"]) +
            detailRow("After 1:00 Sum / 2:31 - 3:00", record["After 1:00 Sum / 2:31 - 3:00"]) +
            detailRow("After 1:00 Sum / 3:01 - 3:30", record["After 1:00 Sum / 3:01 - 3:30"]) +
            detailRow("After 1:00 Sum / After 3:30", record["After 1:00 Sum / After 3:30"]) +
            detailRow("After 1:00 Interval Total", record["After 1:00 Interval Total"] || record[" After 1:00 Interval Total"]) +
            detailRow("Landing Direction", record["Landing Direction"]) +
            detailRow("North or South", record["North or South Inbound"]) +
            detailRow("Arrival Rate", record["Arrival Rate"]) +
            detailRow("Overall Inbound", record["Overall Inbound"]) +
            detailRow("ATA of 00:30 or later", record["ATA of 00:30 or later"]) +
            detailRow("ATA of 00:30 or later-On Time%", record["ATA of 00:30 or later-On Time%"])
          )}

          ${detailCard("Outbound Summary",
            detailRow("Dept. Direction", record["Dept. Direction"]) +
            detailRow("North or South", record["North or South Outbound"]) +
            detailRow("Out Time Average", record["Out Time Average"]) +
            detailRow("Off Time Average", record["Off Time Average"]) +
            detailRow("# Adhoc Feeder Flights", record["# Adhoc Feeder Flights"]) +
            detailRow("Total Adhoc Feeder Volume", record["Total Adhoc Feeder Volume"]) +
            detailRow("# Truck Routes", record["# Truck Routes"]) +
            detailRow("Truck Routes Departed <0600", record["Truck Routes Departed <0600"]) +
            detailRow("Total Alt Moved volume on Feeders and Trucks", record["Total Alt Moved volume on Feeders and Trucks"]) +
            detailRow("Flights worked on Recovery Sort", record["Flights worked on Recovery Sort"]) +
            detailRow("Extended Parameter Flights/Trucks", record["Extended Parameter Flights/Trucks"])
          )}

          ${detailCard("Volume Moved/Missed",
            detailRow("Rolled Flights / Not Worked", record["Rolled Flights / Not Worked"]) +
            detailRow("Rolled Flight # Box Pieces / Not Worked", record["Rolled Flight # Box Pieces / Not Worked"]) +
            detailRow("Rolled Flight # Doc Pieces / Not Worked", record["Rolled Flight # Doc Pieces / Not Worked"]) +
            detailRow("FDEs Rolled (Worked 100pcs>)", record["FDEs Rolled (Worked 100pcs>)"]) +
            detailRow("Estimated Rolled Pieces", record["Estimated Rolled Pieces"]) +
            detailRow("Healthcare Volume recieved", record["Healthcare Volume recieved"]) +
            detailRow("Healthcare volume departed", record["Healthcare volume departed"]) +
            detailRow("Healthcare variance", record["Healthcare variance"]) +
            detailRow("Temp Controlled without CONS", record["Temp Controlled without CONS"]) +
            detailRow("Total Healthcare Volume Alt Moved", record["Total Healthcare Volume Alt Moved"]) +
            detailRow("Lives", record["Lives"]) +
            detailRow("Unprocessed Lives", record["Unprocessed Lives"]) +
            detailRow("Lives Not moved", record["Lives Not moved"])
          )}
        </div>
      `;
    }

    async function loadCSV() {
      const response = await fetch("./sort-recaps.csv", { cache: "no-store" });

      if (!response.ok) {
        throw new Error("Could not fetch sort-recaps.csv");
      }

      const text = await response.text();
      return parseCSV(text);
    }

    async function init() {
      try {
        const csvData = await loadCSV();

        rawData = csvData
          .map(normalizeRecord)
          .map(record => {
            const dateVal = record["Sort Date:"] || record["Sort Date"];
            const parsedDate = parseExcelDate(dateVal);

            return {
              ...record,
              _dateObj: parsedDate
            };
          })
          .filter(record => record._dateObj);

        rawData.sort((a, b) => a._dateObj - b._dateObj);

        if (!rawData.length) {
          showError('The page loaded, but no valid dates were found in sort-recaps.csv. Check that the column is named "Sort Date:" or "Sort Date".');
          calendarGrid.innerHTML = '<div class="empty-message">No valid sort recap data was found.</div>';
          return;
        }

        buildMonthOptions();
        renderCalendar();

        monthSelect.addEventListener("change", function() {
          currentMonthKey = this.value;
          renderCalendar();
        });

        todayBtn.addEventListener("click", function() {
          const now = new Date();
          const thisMonth = formatMonthKey(new Date(now.getFullYear(), now.getMonth(), 1));
          if ([...monthSelect.options].some(opt => opt.value === thisMonth)) {
            currentMonthKey = thisMonth;
            monthSelect.value = thisMonth;
            renderCalendar();
          }
        });
      } catch (error) {
        showError("The page loaded but could not read sort-recaps.csv. Make sure the file is in the root of the repo and then hard refresh the page.");
        calendarGrid.innerHTML = '<div class="empty-message">Calendar data could not be loaded.</div>';
      }
    }

    init();
  </script>
</body>
</html>
